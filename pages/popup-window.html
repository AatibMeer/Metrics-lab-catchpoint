<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browser Popup Transaction | Catchpoint Metrics Lab</title>
    <meta name="description" content="Child browser popup for popup transaction testing.">
    <script defer src="https://g.3gl.net/jp/15222/latest/InitialLoadScript.js"></script>
    <script>
      if (window.RProfiler) {
        window.RProfiler.usePageHide();
      } else {
        window.addEventListener("GlimpseLoaded", function () {
          window.RProfiler.usePageHide();
        });
      }
    </script>
    <meta http-equiv="Report-To" content='{"group":"browser-reports","max_age":2592000,"endpoints":[{"url":"https://r.3gl.net/hawklogserver/15222/re.p"}]}'>
    <meta http-equiv="NEL" content='{"report_to":"browser-reports","max_age":2592000,"success_fraction":0,"failure_fraction":1.0,"include_subdomains":true}'>
    <link rel="stylesheet" href="../assets/styles.css?v=6">
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="page-head">
          <p class="eyebrow">Child popup</p>
          <h1>Browser popup transaction.</h1>
          <p class="lede">This page opens in a separate browser context. Complete a step here or launch the second popup.</p>
        </section>

        <section class="journey-layout">
          <form class="panel form-grid">
            <h2>Popup Interaction</h2>
            <div class="field">
              <label for="popup-probe">Probe name</label>
              <input id="popup-probe" value="Popup probe step" autocomplete="off">
            </div>
            <div class="field">
              <label for="popup-region">Popup region</label>
              <select id="popup-region">
                <option>India</option>
                <option>North America</option>
                <option>Europe</option>
                <option>Asia Pacific</option>
              </select>
            </div>
            <button class="button primary" type="button" data-complete-child-popup>Complete popup step</button>
            <a class="button" href="popup-nested-window.html" target="catchpointNestedPopup" data-open-child-nested>Open second popup</a>
          </form>

          <article class="panel">
            <h2>Popup Status</h2>
            <p class="output" data-child-popup-output>Child popup is waiting for interaction.</p>
          </article>
        </section>
      </div>
    </main>

    <script>
      function notifyOpener(type, detail) {
        if (window.opener) {
          window.opener.postMessage({
            source: "popup-lab",
            type: type,
            detail: detail
          }, "*");
        }
      }

      notifyOpener("window-loaded", "popup-window.html loaded");

      document.querySelector("[data-complete-child-popup]").addEventListener("click", function () {
        var probe = document.querySelector("#popup-probe").value || "Unnamed probe";
        var region = document.querySelector("#popup-region").value || "Unknown region";
        var detail = probe + " in " + region;
        document.querySelector("[data-child-popup-output]").textContent = "Completed " + detail + ".";
        notifyOpener("window-complete", detail);
      });

      document.querySelector("[data-open-child-nested]").addEventListener("click", function () {
        notifyOpener("nested-window-opened", "popup-nested-window.html requested from child popup");
      });
    </script>
  </body>
</html>
