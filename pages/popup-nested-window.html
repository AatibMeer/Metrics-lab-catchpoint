<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nested Popup | Catchpoint Metrics Lab</title>
    <meta name="description" content="Nested child popup for popup scenario testing.">
    <script defer src="https://g.3gl.net/jp/15222/latest/InitialLoadScript.js"></script>
    <script>
      if (window.RProfiler) {
        window.RProfiler.usePageHide();
      } else {
        window.addEventListener("GlimpseLoaded", function () {
          window.RProfiler.usePageHide();
        });
      }
    </script>
    <meta http-equiv="Report-To" content='{"group":"browser-reports","max_age":2592000,"endpoints":[{"url":"https://r.3gl.net/hawklogserver/15222/re.p"}]}'>
    <meta http-equiv="NEL" content='{"report_to":"browser-reports","max_age":2592000,"success_fraction":0,"failure_fraction":1.0,"include_subdomains":true}'>
    <link rel="stylesheet" href="../assets/styles.css?v=6">
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="page-head">
          <p class="eyebrow">Nested browser popup</p>
          <h1>Second popup step.</h1>
          <p class="lede">This page is launched from the child popup. Complete it to send a nested-popup signal back to the original page.</p>
        </section>

        <section class="panel-grid">
          <article class="panel full">
            <h2>Nested Action</h2>
            <label class="checkbox-line">
              <input type="checkbox" data-nested-window-checkbox>
              <span>Acknowledge the nested browser popup.</span>
            </label>
            <div class="hero-actions">
              <button class="button primary" type="button" data-complete-nested-window>Complete nested popup</button>
            </div>
            <p class="output" data-nested-window-output>Nested popup is waiting for acknowledgement.</p>
          </article>
        </section>
      </div>
    </main>

    <script>
      function notifyRoot(type, detail) {
        if (window.opener && window.opener.opener) {
          window.opener.opener.postMessage({
            source: "popup-lab",
            type: type,
            detail: detail
          }, "*");
        } else if (window.opener) {
          window.opener.postMessage({
            source: "popup-lab",
            type: type,
            detail: detail
          }, "*");
        }
      }

      document.querySelector("[data-complete-nested-window]").addEventListener("click", function () {
        var checked = document.querySelector("[data-nested-window-checkbox]").checked;
        var output = document.querySelector("[data-nested-window-output]");

        if (!checked) {
          output.textContent = "Check the acknowledgement box before completing.";
          return;
        }

        output.textContent = "Nested browser popup completed.";
        notifyRoot("nested-window-complete", "Nested browser popup completed");
      });
    </script>
  </body>
</html>
