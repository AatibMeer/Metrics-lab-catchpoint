<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic monitoring network map</title>
  <desc id="desc">A stylized monitoring dashboard with global nodes, request paths, and status panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f2523"/>
      <stop offset="0.55" stop-color="#113f3a"/>
      <stop offset="1" stop-color="#13211f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#8fb2ff"/>
      <stop offset="1" stop-color="#315fc9"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#72dfd1"/>
      <stop offset="1" stop-color="#007b70"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#07110f" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#ffffff" stroke-width="1">
    <path d="M0 180H1200M0 360H1200M0 540H1200M0 720H1200"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="92" y="92" width="1016" height="188" rx="18" fill="#ffffff" opacity="0.94"/>
    <rect x="92" y="334" width="468" height="420" rx="18" fill="#ffffff" opacity="0.94"/>
    <rect x="606" y="334" width="502" height="420" rx="18" fill="#ffffff" opacity="0.94"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#13211f">
    <text x="132" y="148" font-size="34" font-weight="800">Global synthetic checks</text>
    <text x="132" y="192" font-size="20" fill="#61716d">Availability, waterfall, web vitals, API health</text>
  </g>
  <g transform="translate(132 226)">
    <rect width="192" height="18" rx="9" fill="url(#teal)"/>
    <rect x="220" width="132" height="18" rx="9" fill="url(#blue)"/>
    <rect x="380" width="86" height="18" rx="9" fill="#d45b47"/>
    <rect x="494" width="150" height="18" rx="9" fill="#b67816"/>
  </g>
  <g transform="translate(140 392)">
    <path d="M68 224C142 104 226 75 356 128" fill="none" stroke="#007b70" stroke-width="12" stroke-linecap="round"/>
    <path d="M68 224C190 276 270 272 356 128" fill="none" stroke="#315fc9" stroke-width="12" stroke-linecap="round" opacity="0.82"/>
    <circle cx="68" cy="224" r="34" fill="#007b70"/>
    <circle cx="356" cy="128" r="34" fill="#315fc9"/>
    <circle cx="222" cy="76" r="28" fill="#b67816"/>
    <circle cx="250" cy="274" r="28" fill="#17885f"/>
    <text x="28" y="306" font-size="18" font-family="Inter, Arial, sans-serif" fill="#61716d">Probe paths</text>
  </g>
  <g transform="translate(656 388)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="0" font-size="24" font-weight="800" fill="#13211f">Waterfall profile</text>
    <g transform="translate(0 50)">
      <rect width="382" height="18" rx="9" fill="#eef5f1"/>
      <rect width="230" height="18" rx="9" fill="#007b70"/>
      <text x="402" y="16" font-size="16" fill="#61716d">HTML</text>
    </g>
    <g transform="translate(0 96)">
      <rect width="382" height="18" rx="9" fill="#eef5f1"/>
      <rect width="144" height="18" rx="9" fill="#315fc9"/>
      <text x="402" y="16" font-size="16" fill="#61716d">CSS</text>
    </g>
    <g transform="translate(0 142)">
      <rect width="382" height="18" rx="9" fill="#eef5f1"/>
      <rect width="312" height="18" rx="9" fill="#b67816"/>
      <text x="402" y="16" font-size="16" fill="#61716d">Image</text>
    </g>
    <g transform="translate(0 188)">
      <rect width="382" height="18" rx="9" fill="#eef5f1"/>
      <rect width="86" height="18" rx="9" fill="#d45b47"/>
      <text x="402" y="16" font-size="16" fill="#61716d">Error</text>
    </g>
    <g transform="translate(0 262)">
      <rect width="120" height="84" rx="14" fill="#e8f1ff"/>
      <rect x="142" width="120" height="84" rx="14" fill="#e8f8ef"/>
      <rect x="284" width="120" height="84" rx="14" fill="#fff0d9"/>
    </g>
  </g>
</svg>
